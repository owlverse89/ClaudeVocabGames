<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Cubes — Grade 8</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--sur:#1A1F2E;--card:#242B3D;
  --acc:#F59E0B;--ok:#10B981;--err:#EF4444;
  --txt:#E2E8F0;--muted:#94A3B8;--dim:#4B5563;
  --cs:80px;--ch:40px;
}
@media(max-width:560px){:root{--cs:62px;--ch:31px}}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:16px}
#app{width:100%;max-width:680px}

/* ── HEADER ── */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 0 18px;border-bottom:1px solid #1E293B;margin-bottom:22px}
.game-title{font-size:1.55rem;font-weight:900;color:var(--acc);letter-spacing:-0.5px}
.game-title em{color:var(--txt);font-style:normal;font-weight:300}
.grade-tag{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.timer-display{font-size:2.1rem;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-display.urgent{color:var(--err);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* ── CUBES ── */
.cubes-wrap{display:flex;justify-content:center;gap:12px;margin-bottom:18px}
@media(max-width:560px){
  .cubes-wrap{display:grid;grid-template-columns:repeat(3,var(--cs));gap:10px;justify-content:center}
}
.cube-scene{width:var(--cs);height:var(--cs);perspective:420px;flex-shrink:0}
.cube-inner{
  width:var(--cs);height:var(--cs);
  position:relative;transform-style:preserve-3d;
  transform:rotateX(-15deg) rotateY(12deg);
}
.face{
  position:absolute;width:var(--cs);height:var(--cs);
  border-radius:9px;border:2px solid rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  backface-visibility:visible;
}
.f-front {transform:translateZ(var(--ch));background:#FEF3C7}
.f-back  {transform:rotateY(180deg) translateZ(var(--ch));background:#A07010}
.f-right {transform:rotateY(90deg)  translateZ(var(--ch));background:#EFC040}
.f-left  {transform:rotateY(-90deg) translateZ(var(--ch));background:#E5B830}
.f-top   {transform:rotateX(90deg)  translateZ(var(--ch));background:#FFFBEB}
.f-bottom{transform:rotateX(-90deg) translateZ(var(--ch));background:#C08A18}
.cube-letter{font-size:2rem;font-weight:900;color:#1A1F2E;line-height:1;user-select:none}
@media(max-width:560px){.cube-letter{font-size:1.5rem}}
.cube-letter.ph{color:#C0A030;font-size:1.4rem}

/* ── BUTTONS ── */
.btn{padding:10px 26px;border-radius:8px;border:none;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.btn-acc{background:var(--acc);color:#1A1F2E}.btn-acc:hover{background:#D97706}
.btn-acc:disabled{background:#374151;color:var(--dim);cursor:not-allowed}
.btn-ghost{background:#1E293B;color:var(--muted);border:1px solid #334155}
.btn-ghost:hover{background:#253347;color:var(--txt)}
.btn-row{display:flex;justify-content:center;gap:12px;margin-bottom:14px}

/* ── INFO BOXES ── */
.warn-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:9px 16px;color:var(--acc);font-size:.83rem;text-align:center;margin-bottom:12px}
.info-box{text-align:center;color:var(--dim);font-size:.83rem;margin-bottom:14px}
.info-box strong{color:var(--muted)}

/* ── STATS BAR ── */
.stats-bar{display:flex;justify-content:space-around;background:var(--sur);border-radius:10px;padding:10px 18px;margin-bottom:13px}
.stat{text-align:center}
.stat-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
.stat-val{font-size:1.25rem;font-weight:900;color:var(--acc)}

/* ── INPUT ── */
.input-row{display:flex;gap:10px;margin-bottom:6px}
.word-input{
  flex:1;background:var(--sur);border:2px solid #334155;border-radius:8px;
  color:var(--txt);font-size:1.1rem;font-weight:700;padding:10px 16px;
  text-transform:uppercase;letter-spacing:3px;outline:none;
  transition:border-color .18s,background .18s;
}
.word-input:focus{border-color:var(--acc)}
.word-input:disabled{opacity:.4;cursor:not-allowed}
.word-input.f-ok{animation:fok .45s ease}
.word-input.f-err{animation:ferr .45s ease}
@keyframes fok{0%,100%{background:var(--sur)}45%{background:rgba(16,185,129,.14);border-color:var(--ok)}}
@keyframes ferr{0%,100%{background:var(--sur)}45%{background:rgba(239,68,68,.12);border-color:var(--err)}}
.msg-line{height:20px;font-size:.8rem;margin-bottom:8px;transition:opacity .2s}
.msg-ok{color:var(--ok)}.msg-err{color:var(--err)}.msg-info{color:var(--muted)}

/* ── FOUND LIST ── */
.found-header{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:8px}
.found-list{background:var(--sur);border-radius:10px;padding:10px;max-height:200px;overflow-y:auto}
.found-list::-webkit-scrollbar{width:4px}
.found-list::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.found-empty{color:var(--dim);font-size:.82rem;text-align:center;padding:18px 0;font-style:italic}
.word-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:5px;animation:wIn .22s ease}
.word-item:nth-child(odd){background:rgba(255,255,255,.02)}
@keyframes wIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.wi-word{font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:.88rem}
.wi-pts{font-size:.72rem;color:var(--acc);font-weight:700}

/* ── TIMESUP OVERLAY ── */
.tu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.tu-text{font-size:clamp(2.4rem,8vw,4rem);font-weight:900;color:var(--acc);text-align:center;animation:tuPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes tuPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ── RESULTS ── */
.res-card{background:var(--sur);border-radius:16px;padding:26px 22px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.res-hero{text-align:center;padding-bottom:20px;border-bottom:1px solid #2D3748;margin-bottom:22px}
.res-trophy{font-size:2.4rem;margin-bottom:8px}
.res-score{font-size:2.6rem;font-weight:900;color:var(--acc)}
.res-sub{color:var(--muted);font-size:.88rem;margin-top:4px}
.res-count{font-size:1.05rem;font-weight:700;color:var(--txt);margin-top:6px}
.sec-title{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:#2D3748}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
.chip{background:var(--card);border-radius:6px;padding:5px 12px;display:flex;align-items:center;gap:8px}
.chip.best{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35)}
.chip-word{font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:.85rem}
.chip-pts{font-size:.7rem;color:var(--acc)}
.chip-badge{font-size:.6rem;background:var(--acc);color:#1A1F2E;border-radius:3px;padding:1px 5px;font-weight:800;letter-spacing:.5px}
.missed-grp{margin-bottom:14px}
.missed-len{font-size:.72rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.missed-chips{display:flex;flex-wrap:wrap;gap:5px}
.mchip{background:var(--bg);border:1px solid #2D3748;border-radius:5px;padding:3px 10px;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)}
.none-msg{color:var(--dim);font-style:italic;font-size:.83rem}
.pa-row{text-align:center;margin-top:22px;padding-top:18px;border-top:1px solid #2D3748}
</style>
</head>

// ── DICE ─────────────────────────────────────────────────────────────────
const DICE=[
  ['A','E','I','O','U','N'],
  ['A','E','I','R','S','T'],
  ['A','E','O','L','N','D'],
  ['S','T','R','N','L','C'],
  ['H','D','G','M','B','P'],
  ['F','K','W','Y','V','G'],
];

// ── STATE ─────────────────────────────────────────────────────────────────
const REST={x:-15,y:12};
let S={};

function reset(){
  S={
    phase:'shuffle',
    letters:[],
    possible:[],
    possibleByLen:{},
    found:new Set(),
    foundList:[],
    score:0,
    timeLeft:120,
    timerStart:null,
    raf:null,
    animating:false,
    shuffled:false,
    msgT:null,
  };
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function score(len){return{3:1,4:2,5:4,6:8}[len]||0}
function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function canMake(word,pool){
  const p=[...pool];
  for(const c of word){const i=p.indexOf(c);if(i<0)return false;p.splice(i,1)}
  return true;
}
function calcPossible(letters){
  const res=[];
  for(const w of WORDS){
    if(w.length>letters.length)continue;
    if(canMake(w.toUpperCase(),[...letters]))res.push(w);
  }
  return res;
}
function byLen(words){
  const g={};
  for(const w of words){(g[w.length]=g[w.length]||[]).push(w)}
  return g;
}

// ── CUBE ANIMATION ────────────────────────────────────────────────────────
function animCube(inner,newLetter,delay){
  setTimeout(()=>{
    inner.style.transition='none';
    inner.style.transform=`rotateX(${REST.x}deg) rotateY(${REST.y}deg)`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const xs=(3+Math.floor(Math.random()*2))*360+REST.x;
      const ys=(3+Math.floor(Math.random()*2))*360+REST.y;
      inner.style.transition='transform .88s cubic-bezier(.2,.8,.3,1)';
      inner.style.transform=`rotateX(${xs}deg) rotateY(${ys}deg)`;
      setTimeout(()=>{
        const el=inner.querySelector('.cube-letter');
        if(el)el.textContent=newLetter;
      },580);
      setTimeout(()=>{
        inner.style.transition='none';
        inner.style.transform=`rotateX(${REST.x}deg) rotateY(${REST.y}deg)`;
      },920);
    }));
  },delay);
}

// ── SHUFFLE ───────────────────────────────────────────────────────────────
function doShuffle(){
  if(S.animating)return;
  S.animating=true;
  const newLetters=DICE.map(d=>d[Math.floor(Math.random()*6)]);
  DICE.forEach((_,i)=>{
    const inner=document.getElementById(`ci${i}`);
    if(inner)animCube(inner,newLetters[i],i*65);
  });
  const done=DICE.length*65+970;
  setTimeout(()=>{
    S.letters=newLetters;
    S.possible=calcPossible(newLetters);
    S.possibleByLen=byLen(S.possible);
    S.animating=false;
    S.shuffled=true;
    updateShuffleInfo();
  },done);
}

// ── SHUFFLE UI UPDATE ─────────────────────────────────────────────────────
function updateShuffleInfo(){
  const warn=document.getElementById('swarn');
  const info=document.getElementById('sinfo');
  const startBtn=document.getElementById('startBtn');
  const n=S.possible.length;
  if(warn){
    if(n<10&&n>0){
      warn.textContent=`Only ${n} word${n===1?'':'s'} possible with this roll — try reshuffling for a better set.`;
      warn.style.display='block';
    } else if(n===0){
      warn.textContent='No valid words found — please reshuffle.';
      warn.style.display='block';
    } else {
      warn.style.display='none';
    }
  }
  if(info){
    info.innerHTML=n>0?`<strong>${n}</strong> words possible with these letters`:'';
  }
  if(startBtn)startBtn.disabled=(n===0);
}

// ── TIMER ─────────────────────────────────────────────────────────────────
function startTimer(){
  S.timerStart=Date.now();
  function tick(){
    const elapsed=Math.floor((Date.now()-S.timerStart)/1000);
    const left=Math.max(0,120-elapsed);
    S.timeLeft=left;
    const el=document.getElementById('timer');
    if(el){
      el.textContent=fmt(left);
      el.className='timer-display'+(left<=30?' urgent':'');
    }
    if(left<=0){endGame();return}
    S.raf=requestAnimationFrame(tick);
  }
  S.raf=requestAnimationFrame(tick);
}
function stopTimer(){if(S.raf){cancelAnimationFrame(S.raf);S.raf=null}}

// ── SUBMIT WORD ───────────────────────────────────────────────────────────
function submitWord(){
  const inp=document.getElementById('winp');
  if(!inp||inp.disabled)return;
  const raw=inp.value.trim().toLowerCase();
  inp.value='';
  if(!raw)return;
  let reason='';
  if(raw.length<3)reason='Too short — minimum 3 letters';
  else if(raw.length>6)reason='Too long — maximum 6 letters';
  else if(!canMake(raw.toUpperCase(),[...S.letters]))reason='Letter not in your cubes';
  else if(!WORDS.has(raw))reason='Not a recognised word';
  else if(S.found.has(raw))reason='Already found!';
  if(reason){flash('err');showMsg(reason,'err');return}
  const pts=score(raw.length);
  S.found.add(raw);
  S.foundList.unshift({word:raw,pts});
  S.score+=pts;
  flash('ok');
  showMsg(`+${pts} point${pts!==1?'s':''}!`,'ok');
  updateGameUI();
}

function flash(type){
  const inp=document.getElementById('winp');
  if(!inp)return;
  inp.classList.remove('f-ok','f-err');
  void inp.offsetWidth;
  inp.classList.add(type==='ok'?'f-ok':'f-err');
  setTimeout(()=>inp.classList.remove('f-ok','f-err'),500);
}

function showMsg(text,type){
  const el=document.getElementById('msgline');
  if(!el)return;
  el.textContent=text;
  el.className=`msg-line msg-${type}`;
  clearTimeout(S.msgT);
  S.msgT=setTimeout(()=>{if(el)el.textContent=''},2200);
}

// ── UPDATE GAME UI (without full re-render) ───────────────────────────────
function updateGameUI(){
  const fCount=document.getElementById('fcount');
  const fScore=document.getElementById('fscore');
  const fList=document.getElementById('flist');
  if(fCount)fCount.textContent=`${S.found.size} / ${S.possible.length}`;
  if(fScore)fScore.textContent=S.score;
  if(fList){
    if(S.foundList.length===0){
      fList.innerHTML='<div class="found-empty">Words you find appear here…</div>';
    } else {
      fList.innerHTML=S.foundList.map(e=>`
        <div class="word-item">
          <span class="wi-word">${e.word}</span>
          <span class="wi-pts">+${e.pts}pt${e.pts!==1?'s':''}</span>
        </div>`).join('');
    }
  }
}

// ── END GAME ──────────────────────────────────────────────────────────────
function endGame(){
  stopTimer();
  S.phase='timesup';
  const ov=document.createElement('div');
  ov.className='tu-overlay';
  ov.innerHTML='<div class="tu-text">⏱ Time\'s Up!</div>';
  document.body.appendChild(ov);
  setTimeout(()=>{ov.remove();S.phase='results';renderResults()},1600);
}

// ── RENDER: SHUFFLE ───────────────────────────────────────────────────────
function renderShuffle(){
  const cubes=DICE.map((_,i)=>`
    <div class="cube-scene">
      <div class="cube-inner" id="ci${i}">
        <div class="face f-front"><span class="cube-letter ph">?</span></div>
        <div class="face f-back"></div><div class="face f-right"></div>
        <div class="face f-left"></div><div class="face f-top"></div>
        <div class="face f-bottom"></div>
      </div>
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <div>
        <div class="game-title">Word <em>Cubes</em></div>
        <div class="grade-tag">Grade 8 Edition</div>
      </div>
    </div>
    <div class="cubes-wrap">${cubes}</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="doShuffle()">🎲 Shuffle</button>
      <button class="btn btn-acc" id="startBtn" disabled onclick="startGame()">▶ Start</button>
    </div>
    <div class="warn-box" id="swarn" style="display:none"></div>
    <div class="info-box" id="sinfo">Shuffle the cubes to reveal your letters</div>`;
}

// ── START GAME ────────────────────────────────────────────────────────────
function startGame(){
  if(!S.shuffled||S.possible.length===0)return;
  S.phase='playing';
  renderGame();
  startTimer();
}

// ── RENDER: GAME ──────────────────────────────────────────────────────────
function renderGame(){
  const cubes=DICE.map((_,i)=>`
    <div class="cube-scene">
      <div class="cube-inner" id="ci${i}" style="transform:rotateX(${REST.x}deg) rotateY(${REST.y}deg)">
        <div class="face f-front"><span class="cube-letter">${S.letters[i]||'?'}</span></div>
        <div class="face f-back"></div><div class="face f-right"></div>
        <div class="face f-left"></div><div class="face f-top"></div>
        <div class="face f-bottom"></div>
      </div>
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <div>
        <div class="game-title">Word <em>Cubes</em></div>
        <div class="grade-tag">Grade 8 Edition</div>
      </div>
      <div id="timer" class="timer-display">2:00</div>
    </div>
    <div class="cubes-wrap">${cubes}</div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-lbl">Found</div><div class="stat-val" id="fcount">0 / ${S.possible.length}</div></div>
      <div class="stat"><div class="stat-lbl">Score</div><div class="stat-val" id="fscore">0</div></div>
      <div class="stat"><div class="stat-lbl">Letters</div><div class="stat-val" style="font-size:.95rem;letter-spacing:3px">${S.letters.join(' ')}</div></div>
    </div>
    <div class="input-row">
      <input id="winp" class="word-input" type="text" placeholder="TYPE A WORD…" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="btn btn-acc" onclick="submitWord()">Submit</button>
    </div>
    <div id="msgline" class="msg-line"></div>
    <div class="found-header">Words Found</div>
    <div class="found-list" id="flist"><div class="found-empty">Words you find appear here…</div></div>`;

  const inp=document.getElementById('winp');
  if(inp){
    inp.focus();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitWord()});
  }
}

// ── RENDER: RESULTS ───────────────────────────────────────────────────────
function renderResults(){
  const total=S.possible.length;
  const found=S.foundList.length;
  const trophy=found===0?'📖':found===total?'🏆':found>=total/2?'🥈':'🥉';

  // Best word
  let bestWord=null;
  if(S.foundList.length>0){
    bestWord=[...S.foundList].sort((a,b)=>b.pts-a.pts||b.word.length-a.word.length)[0];
  }

  // Found chips
  const foundChips=S.foundList.length===0
    ?'<div class="none-msg">No words found this round.</div>'
    :S.foundList.map(e=>{
        const isBest=bestWord&&e.word===bestWord.word;
        return`<div class="chip${isBest?' best':''}">
          ${isBest?'<span class="chip-badge">BEST</span>':''}
          <span class="chip-word">${e.word}</span>
          <span class="chip-pts">${e.pts}pt${e.pts!==1?'s':''}</span>
        </div>`;
      }).join('');

  // Missed words grouped by length (descending)
  const missedLengths=Object.keys(S.possibleByLen).map(Number).sort((a,b)=>b-a);
  let missedHTML='';
  let anyMissed=false;
  for(const len of missedLengths){
    const missed=S.possibleByLen[len].filter(w=>!S.found.has(w)).sort();
    if(missed.length===0)continue;
    anyMissed=true;
    const label={3:'3 letters',4:'4 letters',5:'5 letters',6:'6 letters'}[len]||`${len} letters`;
    missedHTML+=`<div class="missed-grp">
      <div class="missed-len">${label}</div>
      <div class="missed-chips">${missed.map(w=>`<span class="mchip">${w}</span>`).join('')}</div>
    </div>`;
  }
  if(!anyMissed)missedHTML='<div class="none-msg">You found them all — perfect round! 🎉</div>';

  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <div>
        <div class="game-title">Word <em>Cubes</em></div>
        <div class="grade-tag">Grade 8 Edition</div>
      </div>
    </div>
    <div class="res-card">
      <div class="res-hero">
        <div class="res-trophy">${trophy}</div>
        <div class="res-score">${S.score} pts</div>
        <div class="res-sub">Letters played: <strong style="letter-spacing:2px">${S.letters.join(' ')}</strong></div>
        <div class="res-count">Found <strong style="color:var(--acc)">${found}</strong> of <strong>${total}</strong> possible words</div>
      </div>

      <div class="sec-title">Words You Found</div>
      <div class="chips" style="margin-bottom:24px">${foundChips}</div>

      <div class="sec-title">Words You Missed</div>
      ${missedHTML}

      <div class="pa-row">
        <button class="btn btn-acc" style="padding:12px 40px;font-size:1rem" onclick="playAgain()">▶ Play Again</button>
      </div>
    </div>`;
}

// ── PLAY AGAIN ────────────────────────────────────────────────────────────
function playAgain(){
  reset();
  renderShuffle();
}

// ── INIT ──────────────────────────────────────────────────────────────────
reset();
renderShuffle();
</script>
</body>
</html>
