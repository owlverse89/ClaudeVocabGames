    function getPuzzleIndex() {
      const start = new Date("2026-04-21");
      const today = new Date();
      return Math.abs(Math.floor((today - start) / 86400000)) % 3;
    }

    const MAX_ATTEMPTS = 3;

    /* ── Score badges ──────────────────────────────────────────── */
    const SCORE_BADGES = [
      { min: 15, title: "You are a Wordmaster!",   sub: "Flawless. Every word, first try.",               color: "#4A38A8", bg: "#EFEDFB", border: "#B8B0EC" },
      { min: 12, title: "You are a Linguist!",      sub: "Sharp instincts and a rich vocabulary.",         color: "#2E7D52", bg: "#E8F5EE", border: "#8ECBA8" },
      { min: 9,  title: "You are a Word Sleuth!",   sub: "Persistent, methodical, and accurate.",          color: "#8C5E00", bg: "#FDF3DC", border: "#EEC96A" },
      { min: 6,  title: "You are a Word Scout!",    sub: "A good effort — keep exploring!",               color: "#1B5FA0", bg: "#E4F0FB", border: "#87C0EC" },
      { min: 0,  title: "You are a Word Wanderer!", sub: "Every expert started somewhere. Try again!",     color: "#5E5E7A", bg: "#F2F0FF", border: "#C4BFF0" },

    function getScoreBadge(score) { return SCORE_BADGES.find(b => score >= b.min); }

    /* ── Logo ──────────────────────────────────────────────────── */

        <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
          <rect width="44" height="44" rx="10" fill="#EFEDFB"/>
          <rect x="7"  y="10" width="12" height="12" rx="3" fill="#8B82DD"/>
          <rect x="21" y="10" width="12" height="12" rx="3" fill="#B8B0EC"/>
          <rect x="14" y="24" width="12" height="12" rx="3" fill="#5E54C8"/>
          <circle cx="19.5" cy="16" r="2" fill="white"/>
          <circle cx="27"   cy="16" r="2" fill="white"/>
          <circle cx="20"   cy="30" r="2" fill="white"/>
        </svg>
      );
    }

    /* ── Fireworks ─────────────────────────────────────────────── */
    function Fireworks({ onDone }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const particles = [];
        const colors = ["#8B82DD","#5EC48A","#F0C040","#5BA8E8","#E87090","#5ED0C0"];
        for (let b = 0; b < 6; b++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height * 0.6;
          const color = colors[b % colors.length];
          for (let i = 0; i < 28; i++) {
            const angle = (Math.PI * 2 / 28) * i;
            const speed = 2 + Math.random() * 3;
            particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color, r: 2 + Math.random()*2 });
          }
        }
        let frame;
        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.alpha -= 0.018;
            if (p.alpha <= 0) return;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2, "0");
            ctx.fill();
          });
          if (particles.some(p => p.alpha > 0)) frame = requestAnimationFrame(draw);
          else onDone && onDone();
        }
        frame = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(frame);
      }, []);
      return <canvas ref={canvasRef} style={{position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", borderRadius:12}} />;
    }

    /* ── Word result list (end screen) ─────────────────────────── */
    function WordResultList({ wordHistory, scores, puzzle }) {
      const [openIdx, setOpenIdx] = useState(null);
      return (
        <div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:"0.5rem"}}>
          {wordHistory.map((w, i) => {
            const got = w.result === "correct";
            const pts = scores[i];
            let bg, col, br;
            if (got) {
              if (pts === 3)      { bg = "#E8F5EE"; col = "#2E7D52"; br = "#8ECBA8"; }
              else if (pts === 2) { bg = "#FDF3DC"; col = "#8C5E00"; br = "#EEC96A"; }
              else                { bg = "#EFEDFB"; col = "#4A38A8"; br = "#B8B0EC"; }
            } else               { bg = "#FDEAEA"; col = "#A33030"; br = "#F0A0A0"; }
            const lbl = got ? (pts===3 ? "1st try  +3" : pts===2 ? "2nd try  +2" : "3rd try  +1") : "missed  +0";
            const meaning = puzzle.words[i]?.clue || "";
            const isOpen  = openIdx === i;
            return (
              <div key={i} style={{borderRadius:10, background:bg, border:`0.5px solid ${br}`, overflow:"hidden"}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"0.75rem 1rem"}}>
                  <span style={{fontWeight:500, fontSize:15, color:col, letterSpacing:1.5}}>{w.word}</span>
                  <div style={{display:"flex", alignItems:"center", gap:10}}>
                    <span style={{fontSize:13, color:col, opacity:0.85}}>{lbl}</span>
                    <button onClick={() => setOpenIdx(isOpen ? null : i)}
                      style={{fontSize:11, padding:"2px 8px", borderRadius:20, border:`0.5px solid ${br}`, background:"transparent", color:col, cursor:"pointer", fontWeight:500, opacity:0.8}}>
                      {isOpen ? "hide" : "meaning"}
                    </button>
                  </div>
                </div>
                {isOpen && (
                  <div style={{padding:"0 1rem 0.75rem"}}>
                    <p style={{margin:0, fontSize:13, color:col, opacity:0.85, lineHeight:1.5, borderTop:`0.5px solid ${br}`, paddingTop:"0.6rem"}}>{meaning}</p>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    /* ── End screen ────────────────────────────────────────────── */
    function EndScreen({ puzzle, scores, wordHistory, themeRevealed, level, onPlayAgain }) {
      const [firing, setFiring] = useState(true);

      return (
        <div style={{padding:"1.5rem 1rem", maxWidth:520, margin:"0 auto", position:"relative"}}>
          {firing && (
            <div style={{position:"fixed", inset:0, pointerEvents:"none", zIndex:10}}>

            </div>
          )}

          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:"1.5rem"}}>

            </div>
          </div>

          <div style={{background:badge.bg, border:`0.5px solid ${badge.border}`, borderRadius:12, padding:"1.25rem", marginBottom:"1.25rem"}}>

            <p style={{margin:"0 0 0.75rem", fontSize:13, color:badge.color, opacity:0.85}}>{badge.sub}</p>

            border:     themeRevealed ? "0.5px solid #C4BFF0" : `0.5px solid ${T.borSec}`,
            transition: "background 0.6s, border 0.6s"}}>

          </button>
        </div>
      );

    /* ── Main game ─────────────────────────────────────────────── */
    function Linkle() {
      const [screen,        setScreen]        = useState("home");
      const [level,         setLevel]         = useState(null);
      const [puzzle,        setPuzzle]        = useState(null);
      const [wordIndex,     setWordIndex]     = useState(0);
      const [input,         setInput]         = useState("");
      const [attempts,      setAttempts]      = useState(0);
      const [showNudge,     setShowNudge]     = useState(false);
      const [wordResult,    setWordResult]    = useState(null);
      const [scores,        setScores]        = useState([]);
      const [allDone,       setAllDone]       = useState(false);
      const [themeRevealed, setThemeRevealed] = useState(false);
      const [shake,         setShake]         = useState(false);
      const [wordHistory,   setWordHistory]   = useState([]);
      const [wrongGuesses,  setWrongGuesses]  = useState([]);
      const inputRef = useRef(null);

      useEffect(() => {
        if (screen === "game" && inputRef.current) inputRef.current.focus();
      }, [screen, wordIndex, wordResult]);

      function startGame(lvl) {
        const p = WORD_BANK[lvl][getPuzzleIndex()];
        setLevel(lvl); setPuzzle(p);
        setWordIndex(0); setInput(""); setAttempts(0);
        setShowNudge(false); setWordResult(null);
        setScores([]); setAllDone(false); setThemeRevealed(false);
        setWordHistory([]); setWrongGuesses([]);
        setScreen("game");
      }

      function handleGuess() {
        if (!input.trim() || wordResult) return;
        const guess       = input.trim().toUpperCase();
        const correct     = puzzle.words[wordIndex].word;
        const newAttempts = attempts + 1;
        setAttempts(newAttempts);
        setInput("");
        if (guess === correct) {
          const pts = newAttempts === 1 ? 3 : newAttempts === 2 ? 2 : 1;
          setScores(s => [...s, pts]);
          setWordResult("correct");
          setWordHistory(h => [...h, { word: correct, result: "correct", attempts: newAttempts }]);
          setWrongGuesses([]);
        } else {
          setWrongGuesses(g => [...g, guess]);
          if (newAttempts === 2) setShowNudge(true);
          if (newAttempts >= MAX_ATTEMPTS) {
            setScores(s => [...s, 0]);
            setWordResult("revealed");
            setWordHistory(h => [...h, { word: correct, result: "missed", attempts: newAttempts }]);
            setWrongGuesses([]);
          } else {
            setShake(true); setTimeout(() => setShake(false), 500);
          }
        }
      }

      function nextWord() {
        const next = wordIndex + 1;
        if (next >= puzzle.words.length) {
          setAllDone(true);
          setTimeout(() => setThemeRevealed(true), 700);
        } else {
          setWordIndex(next); setInput(""); setAttempts(0);
          setShowNudge(false); setWordResult(null); setWrongGuesses([]);
        }
      }

      const totalScore = () => scores.reduce((a, b) => a + b, 0);
      const lvlMeta    = LEVELS.find(l => l.id === level);

      if (screen === "home")  return <Home onStart={() => setScreen("level")} />;
      if (screen === "level") return <LevelSelect onSelect={startGame} onBack={() => setScreen("home")} />;
      if (!puzzle)            return null;
      if (allDone)            return <EndScreen puzzle={puzzle} scores={scores} wordHistory={wordHistory} themeRevealed={themeRevealed} level={lvlMeta} onPlayAgain={() => setScreen("level")} />;

      const cw         = puzzle.words[wordIndex];
      const isLastWord = wordIndex === puzzle.words.length - 1;

      return (
        <div style={{padding:"1.5rem 1rem", maxWidth:560, margin:"0 auto"}}>

          {/* Header */}
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1.5rem"}}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <Logo />
              <div>
                <span style={{fontSize:20, fontWeight:500, color:T.txtPri}}>Linkle</span>
                <p style={{fontSize:12, color:T.txtSec, margin:0}}>Uncover the words. Discover the link.</p>
              </div>
            </div>
            <span style={{fontSize:12, padding:"3px 10px", borderRadius:20, background:lvlMeta.bg, color:lvlMeta.color, fontWeight:500, border:`0.5px solid ${lvlMeta.border}`}}>
              {lvlMeta.label}
            </span>
          </div>

          {/* Theme strip */}
          <div style={{background:T.bgSec, borderRadius:8, padding:"0.6rem 1rem", marginBottom:"1.5rem", display:"flex", alignItems:"center", gap:8, border:`0.5px solid ${T.borTer}`}}>
            <span style={{fontSize:13, color:T.txtSec}}>Today's theme:</span>
            <span style={{fontSize:14, fontWeight:500, color:T.txtPri, fontStyle:"italic"}}>"{puzzle.themeTitle}"</span>
          </div>

          {/* Progress bar */}
          <div style={{display:"flex", gap:6, marginBottom:"1.5rem"}}>
            {puzzle.words.map((_, i) => {
              let bg = T.bgSec, border = `0.5px solid ${T.borTer}`;
              if (i < wordIndex) {
                bg     = scores[i] > 0 ? "#E8F5EE" : "#FDEAEA";
                border = scores[i] > 0 ? "0.5px solid #8ECBA8" : "0.5px solid #F0A0A0";
              } else if (i === wordIndex) {
                border = `1.5px solid ${T.borPri}`;
              }
              return <div key={i} style={{flex:1, height:6, borderRadius:4, background:bg, border}} />;
            })}
          </div>

          {/* Word counter + attempts */}
          <div style={{marginBottom:"0.5rem", display:"flex", justifyContent:"space-between"}}>
            <span style={{fontSize:13, color:T.txtSec}}>Word {wordIndex+1} of {puzzle.words.length}</span>
            <span style={{fontSize:13, color:T.txtSec}}>{MAX_ATTEMPTS - attempts} attempt{MAX_ATTEMPTS - attempts !== 1 ? "s" : ""} left</span>
          </div>

          {/* Clue card */}
          <div style={{background:T.bgCard, border:`0.5px solid ${T.borTer}`, borderRadius:12, padding:"1.25rem", marginBottom:"1rem"}}>
            <p style={{fontSize:16, color:T.txtPri, margin:0, lineHeight:1.6}}>{cw.clue}</p>
            {showNudge && !wordResult && (
              <p style={{fontSize:14, color:T.txtSec, marginTop:"0.75rem", marginBottom:0, borderTop:`0.5px solid ${T.borTer}`, paddingTop:"0.75rem"}}>
                Hint: {cw.nudge}
              </p>
            )}
          </div>

          {/* Input or result */}
          {!wordResult ? (
            <div style={{display:"flex", gap:8, marginBottom:"0.75rem"}}>
              <input
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value.toUpperCase())}
                onKeyDown={e => e.key === "Enter" && handleGuess()}
                placeholder="Type your answer..."
                style={{flex:1, fontSize:16, fontWeight:500, letterSpacing:2, padding:"10px 14px", borderRadius:8,
                  border: shake ? "1.5px solid #E07070" : `0.5px solid ${T.borSec}`,
                  background: T.bgPri, color: T.txtPri, outline:"none",
                  animation: shake ? "shake 0.4s" : "none"}}
              />
              <button onClick={handleGuess}
                style={{padding:"10px 20px", borderRadius:8, fontSize:15, fontWeight:500, cursor:"pointer", border:`0.5px solid ${T.borSec}`, background:T.bgSec, color:T.txtPri}}>
                Check
              </button>
            </div>
          ) : (
            <div style={{padding:"1rem 1.25rem", borderRadius:12, marginBottom:"0.75rem",
              background: wordResult === "correct" ? "#E8F5EE" : "#FDEAEA",
              border:     wordResult === "correct" ? "0.5px solid #8ECBA8" : "0.5px solid #F0A0A0"}}>
              <p style={{margin:0, fontWeight:500, fontSize:15, color: wordResult === "correct" ? "#2E7D52" : "#A33030"}}>
                {wordResult === "correct"
                  ? `Correct! "${cw.word}" — ${attempts===1 ? "First try! +3" : attempts===2 ? "+2" : "+1"}`
                  : `The word was "${cw.word}".`}
              </p>
              <button onClick={nextWord}
                style={{marginTop:"0.75rem", padding:"8px 18px", borderRadius:8, fontSize:14, cursor:"pointer", border:`0.5px solid ${T.borSec}`, background:T.bgPri, color:T.txtPri, fontWeight:500}}>
                {isLastWord ? "See results →" : "Next word →"}
              </button>
            </div>
          )}

          {/* Score */}
          <div style={{display:"flex", justifyContent:"flex-end"}}>
            <span style={{fontSize:13, color:T.txtSec}}>Score: {totalScore()}</span>
          </div>

          {/* Wrong guesses */}
          {wrongGuesses.length > 0 && !wordResult && (
            <div style={{marginTop:"0.6rem", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
              <span style={{fontSize:11, color:T.txtTer, fontStyle:"italic"}}>guessed:</span>
              {wrongGuesses.map((g, i) => (
                <span key={i} style={{fontSize:11, fontStyle:"italic", letterSpacing:0.5, padding:"1px 7px", borderRadius:20, background:T.bgSec, color:T.txtTer, border:`0.5px solid ${T.borTer}`}}>{g}</span>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Linkle />);
  </script>
</body>
</html>
